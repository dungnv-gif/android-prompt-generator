<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Prompt Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      min-height: 100vh;
      padding: 30px 15px;
    }
    .container {
      max-width: 1150px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(to right, #1e40af, #2563eb);
      color: white;
      padding: 35px;
      text-align: center;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      background: #f1f5f9;
      padding: 8px;
      gap: 8px;
      border-bottom: 1px solid #e5e7eb;
    }
    .tab {
      flex: 1;
      padding: 14px 20px;
      background: transparent;
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .tab:hover {
      background: rgba(37, 99, 235, 0.08);
      color: #2563eb;
    }
    .tab.active {
      background: white;
      color: #2563eb;
      border-color: #2563eb;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }
    .tab svg { width: 22px; height: 22px; }

    .content {
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .form-group { margin-bottom: 26px; }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-weight: 600;
      color: #1f2937;
      font-size: 15.5px;
    }
    .svg-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      transition: transform 0.3s;
      color: #2563eb;
    }
    label:hover .svg-icon { transform: scale(1.15); }
    input, textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    input:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.2);
      transform: translateY(-2px);
      outline: none;
    }
    textarea { min-height: 110px; resize: vertical; }

    .platform-hint {
      font-size: 13px;
      color: #d97706;
      margin-top: 8px;
      padding: 10px 14px;
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
    }

    .btn {
      padding: 16px 28px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-primary { background: linear-gradient(to right, #2563eb, #3b82f6); color: white; }
    .btn-copy { background: #10b981; color: white; }
    .btn:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.25);
    }
    #resultPrompt {
      width: 100%;
      height: 380px;
      background: #f8fafc;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px;
      font-family: monospace;
      font-size: 14.8px;
      line-height: 1.65;
      resize: none;
      transition: background-color 0.4s;
    }

    .platform-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-left: 10px;
    }
    .badge-android { background: #d1fae5; color: #065f46; }
    .badge-iphone { background: #e0e7ff; color: #3730a3; }
    .badge-ipad { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 style="font-size: 34px; display: flex; align-items: center; justify-content: center; gap: 14px; color: white;">
        <svg class="svg-icon" style="color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/>
        </svg>
        Prompt Generator
      </h1>
      <p style="margin-top: 8px; font-size: 18px; opacity: 0.95; color: white;">Store Listing Prompt — Đa nền tảng</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-platform="android">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/>
        </svg>
        Android
      </button>
      <button class="tab" data-platform="iphone">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/>
        </svg>
        iPhone
      </button>
      <button class="tab" data-platform="ipad">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2.5" ry="2.5"/>
          <circle cx="12" cy="18.5" r="0.6" fill="currentColor"/>
        </svg>
        iPad
      </button>
    </div>

    <div class="content">
      <div>
        <div class="form-group">
          <label>
            <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
            </svg>
            Hình ảnh Mockup 
          </label>
          <textarea id="Mo_ta_UI">The phone screen displays exactly the provided UI image</textarea>
          <div id="ipadHint" class="platform-hint" style="display: none;">
            💡 <strong>iPad mode:</strong> Prompt sẽ tự thêm yêu cầu AI điều chỉnh bố cục từ layout điện thoại sang tablet (multi-column, tận dụng không gian rộng)
          </div>
        </div>

        <div class="form-group">
          <label>
            <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/>
            </svg>
            Loại thiết bị Mockup
            <span id="platformBadge" class="platform-badge badge-android">Android</span>
          </label>
          <input type="text" id="Mockup_Dien_Thoai" value="Android flagship cao cấp, viền màn hình siêu mỏng, nhìn trực diện">
        </div>

        <div class="form-group">
          <label>
            <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 7.5h-.75A2.25 2.25 0 004.5 9.75v7.5a2.25 2.25 0 002.25 2.25h7.5a2.25 2.25 0 002.25-2.25v-7.5a2.25 2.25 0 00-2.25-2.25h-.75m-6 3.75l3 3m0 0l3-3m-3 3V1.5m6 9h.75a2.25 2.25 0 012.25 2.25v7.5a2.25 2.25 0 01-2.25 2.25h-7.5"/>
            </svg>
            Yếu tố ngoại cảnh / Hành động
          </label>
          <input type="text" id="Hanh_dong_Tay" value="Không có tay">
        </div>

        <div class="form-group">
          <label>
            <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.429 9.75L2.25 12l4.179 2.25m0-4.5l5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L21.75 12l-4.179 2.25m0 0l4.179 2.25L12 21.75 2.25 16.5l4.179-2.25m11.142 0l-5.571 3-5.571-3"/>
            </svg>
            Background
          </label>
          <input type="text" id="Boi_canh_Background" value="Nền Gradient cam trắng, studio lighting tối giản, không có người">
        </div>

        <div class="form-group">
          <label>
            <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
            </svg>
            Hoa tiết trang trí
          </label>
          <input type="text" id="Hoa_tiet_Trang_tri" value="Icon 3D nổi bật, đường kẻ mờ trừu tượng, particle nhẹ">
        </div>

        <div class="form-group">
          <label>
            <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
            </svg>
            Kích thước ảnh
            <span style="font-size: 12px; font-weight: 400; color: #64748b; margin-left: auto;">tự đổi theo tab • có thể sửa tay</span>
          </label>
          <input type="text" id="Kich_Thuoc" value="1024x2208">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label>
              <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"/>
              </svg>
              Tiêu đề
            </label>
            <input type="text" id="Title" value="GPS CAMERA">
          </div>
          <div class="form-group">
            <label>
              <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
              </svg>
              Subtitle
            </label>
            <input type="text" id="Subtitle" value="Lưu giữ ký ức từng vị trí">
          </div>
        </div>
      </div>

      <div>
        <label style="margin-bottom: 12px; font-weight: 600; color: #1f2937; font-size: 15.5px;">
          <svg class="svg-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
          </svg>
          Prompt Kết Quả
        </label>
        <textarea id="resultPrompt" readonly></textarea>
        
        <div style="display: flex; gap: 16px; margin-top: 30px;">
          <button id="generateBtn" class="btn btn-primary" style="flex: 1;">
            <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.493 4.493 0 00-1.757 4.306 4.493 4.493 0 004.306-1.758M16.5 9a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/>
            </svg>
            Tạo Prompt
          </button>
          <button id="copyBtn" class="btn btn-copy" style="flex: 1;">
            <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/>
            </svg>
            Copy Prompt
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const platforms = {
      android: {
        label: 'Android',
        size: '1024x2208',
        mockup: 'Android flagship cao cấp, viền màn hình siêu mỏng, nhìn trực diện',
        storeText: 'Android Google Play Store Listing',
        layoutNote: '',
        badgeClass: 'badge-android'
      },
      iphone: {
        label: 'iPhone',
        size: '1242x2688',
        mockup: 'iPhone 15 Pro Max, viền titan, Dynamic Island, nhìn trực diện',
        storeText: 'iOS App Store Listing for iPhone',
        layoutNote: '',
        badgeClass: 'badge-iphone'
      },
      ipad: {
        label: 'iPad',
        size: '2048x2732',
        mockup: 'iPad Pro 12.9 inch, viền mỏng, màn hình Liquid Retina, portrait orientation, nhìn trực diện',
        storeText: 'iOS App Store Listing for iPad',
        layoutNote: 'IMPORTANT — Adapt the provided phone UI to an iPad tablet layout: intelligently re-arrange UI elements to utilize the wider screen space with multi-column layouts, sidebar navigation if applicable, larger touch targets, and proper iPad UI proportions. Do NOT simply stretch the phone UI vertically; restructure it as a native iPad interface following Apple Human Interface Guidelines for iPad',
        badgeClass: 'badge-ipad'
      }
    };

    let currentPlatform = 'android';

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentPlatform = tab.dataset.platform;
        applyPlatform(currentPlatform);
      });
    });

    function applyPlatform(key) {
      const p = platforms[key];
      document.getElementById('Kich_Thuoc').value = p.size;
      document.getElementById('Mockup_Dien_Thoai').value = p.mockup;
      const badge = document.getElementById('platformBadge');
      badge.textContent = p.label;
      badge.className = 'platform-badge ' + p.badgeClass;
      document.getElementById('ipadHint').style.display = key === 'ipad' ? 'block' : 'none';
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const p = platforms[currentPlatform];
      const Mo_ta_UI = document.getElementById('Mo_ta_UI').value.trim();
      const Mockup = document.getElementById('Mockup_Dien_Thoai').value.trim();
      const Hanh_dong = document.getElementById('Hanh_dong_Tay').value.trim();
      const Background = document.getElementById('Boi_canh_Background').value.trim();
      const Hoatiet = document.getElementById('Hoa_tiet_Trang_tri').value.trim();
      const KichThuoc = document.getElementById('Kich_Thuoc').value.trim() || p.size;
      const Title = document.getElementById('Title').value.trim();
      const Subtitle = document.getElementById('Subtitle').value.trim();

      const layoutBlock = p.layoutNote ? `\n${p.layoutNote}.` : '';

      const prompt = `A professional ${p.storeText} screenshot, ${KichThuoc} resolution.
${Mo_ta_UI}.${layoutBlock}
Mockup of ${Mockup}.
${Hanh_dong}.
${Background}.
${Hoatiet}.
Text: "${Title}" - "${Subtitle}".
High-fidelity, 8k resolution, professional app store aesthetic, soft studio lighting, sharp focus --ar ${KichThuoc}`;

      const resultArea = document.getElementById('resultPrompt');
      resultArea.value = prompt.trim();
      resultArea.style.backgroundColor = '#ecfdf5';
      setTimeout(() => resultArea.style.backgroundColor = '#f8fafc', 800);
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const ta = document.getElementById('resultPrompt');
      ta.select();
      document.execCommand('copy');
      const btn = document.getElementById('copyBtn');
      const oldHTML = btn.innerHTML;
      btn.innerHTML = '✅ Đã Copy!';
      setTimeout(() => btn.innerHTML = oldHTML, 2000);
    });

    applyPlatform('android');
  </script>
</body>
</html>
